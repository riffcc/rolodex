name: sdk

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  sdks:
    # Riff CI runs on our Debian 13 self-hosted fleet.
    runs-on: [self-hosted, Linux, X64, lxc, spacetempagency]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux bwrap build dependencies
        shell: bash
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then
            as_root() { sudo "$@"; }
          elif [[ "$(id -u)" -eq 0 ]]; then
            as_root() { "$@"; }
          else
            if command -v pkg-config >/dev/null 2>&1; then
              echo "apt-get is available but this runner has no sudo/root; assuming build dependencies are preinstalled."
              exit 0
            fi
            echo "pkg-config is missing and this runner cannot install packages without sudo/root." >&2
            exit 1
          fi
          as_root apt-get update -y
          packages=(pkg-config libcap-dev libasound2-dev libudev-dev)
          as_root env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends "${packages[@]}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@1.93.0

      - name: build codex
        run: cargo build --bin codex
        working-directory: codex-rs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm -r --filter ./sdk/typescript run build

      - name: Lint SDK packages
        run: pnpm -r --filter ./sdk/typescript run lint

      - name: Test SDK packages
        run: pnpm -r --filter ./sdk/typescript run test
