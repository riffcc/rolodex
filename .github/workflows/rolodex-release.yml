name: rolodex-release

on:
  push:
    tags:
      - "rolodex-v*"

jobs:
  version:
    runs-on: [self-hosted, Linux, X64, lxc, spacetempagency]
    outputs:
      stable: ${{ steps.version.outputs.stable }}
      debian: ${{ steps.version.outputs.debian }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute stable Rolodex version
        id: version
        run: |
          set -euo pipefail
          STABLE="$(./scripts/rolodex-version.py --format stable)"
          DEB="$(./scripts/rolodex-version.py --format debian-stable)"
          EXPECTED_TAG="rolodex-v${STABLE}"
          if [[ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]]; then
            echo "expected tag $EXPECTED_TAG but got $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "debian=$DEB" >> "$GITHUB_OUTPUT"

  build-linux-amd64:
    needs: version
    runs-on: [self-hosted, Linux, X64, lxc, spacetempagency]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6

      - name: Stamp Cargo workspace version for this build
        working-directory: .
        run: ./scripts/set-workspace-version.py "${{ needs.version.outputs.stable }}"

      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          if ! command -v apt-get >/dev/null 2>&1; then
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            as_root() { sudo "$@"; }
          elif [[ "$(id -u)" -eq 0 ]]; then
            as_root() { "$@"; }
          else
            if command -v pkg-config >/dev/null 2>&1 && command -v cc >/dev/null 2>&1; then
              echo "Build dependencies are preinstalled."
              exit 0
            fi
            echo "Build dependencies missing and this runner cannot install packages without sudo/root." >&2
            exit 1
          fi
          as_root apt-get update -y
          packages=(build-essential pkg-config libcap-dev libasound2-dev libudev-dev dpkg-dev)
          as_root env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends "${packages[@]}"

      - uses: dtolnay/rust-toolchain@1.93.0

      - name: Cargo build Rolodex
        run: cargo build --release --bin rolodex

      - name: Prepare release artifacts
        working-directory: .
        run: |
          set -euo pipefail
          mkdir -p dist
          cp codex-rs/target/release/rolodex "dist/rolodex-linux-amd64-${{ needs.version.outputs.stable }}"
          ./scripts/build-rolodex-deb.sh "${{ needs.version.outputs.debian }}" codex-rs/target/release/rolodex dist

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rolodex-linux-amd64
          path: |
            dist/rolodex-linux-amd64-${{ needs.version.outputs.stable }}
            dist/rolodex_${{ needs.version.outputs.debian }}_amd64.deb

  build-macos-arm64:
    needs: version
    runs-on: macos-15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6

      - name: Stamp Cargo workspace version for this build
        working-directory: .
        run: ./scripts/set-workspace-version.py "${{ needs.version.outputs.stable }}"

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: aarch64-apple-darwin

      - name: Cargo build Rolodex
        run: cargo build --release --target aarch64-apple-darwin --bin rolodex

      - name: Prepare artifact
        working-directory: .
        run: |
          set -euo pipefail
          mkdir -p dist
          cp codex-rs/target/aarch64-apple-darwin/release/rolodex "dist/rolodex-macos-arm64-${{ needs.version.outputs.stable }}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rolodex-macos-arm64
          path: dist/rolodex-macos-arm64-${{ needs.version.outputs.stable }}

  release:
    needs: [version, build-linux-amd64, build-macos-arm64]
    runs-on: [self-hosted, Linux, X64, lxc, spacetempagency]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -R dist/

      - name: Publish Rolodex release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: dist/*
